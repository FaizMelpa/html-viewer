<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="100%" style="stop-color:#7B2FFF"/>
    </linearGradient>
  </defs>

  <!-- Background hitam -->
  <rect width="108" height="108" rx="22" fill="#0A0A0A"/>

  <!-- Subtle grid lines biar ga kosong banget -->
  <line x1="0" y1="54" x2="108" y2="54" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="54" y1="0" x2="54" y2="108" stroke="#1A1A1A" stroke-width="1"/>

  <!-- </> teks utama -->
  <text
    x="54"
    y="63"
    text-anchor="middle"
    font-family="monospace, 'Courier New', Courier"
    font-size="32"
    font-weight="900"
    fill="url(#textGrad)"
    letter-spacing="-1"
  >&lt;/&gt;</text>

  <!-- Glow effect - layer tipis di bawah -->
  <text
    x="54"
    y="63"
    text-anchor="middle"
    font-family="monospace, 'Courier New', Courier"
    font-size="32"
    font-weight="900"
    fill="url(#textGrad)"
    opacity="0.25"
    filter="blur(6px)"
    letter-spacing="-1"
  >&lt;/&gt;</text>

  <!-- Dot aksen kecil di bawah -->
  <circle cx="54" cy="78" r="2.5" fill="#00D2FF" opacity="0.6"/>
</svg>
